name: Deploy App

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "mdFiles/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run deploy script
        run: bash scripts/deploy.sh

      - name: Health check
        run: |
          sleep 3
          curl -sf http://127.0.0.1:4000/health \
            && echo "API server is up" \
            || (echo "API health check failed" && exit 1)
          curl -sf http://127.0.0.1:3000/login \
            && echo "Next app is up" \
            || (echo "Next health check failed" && exit 1)
