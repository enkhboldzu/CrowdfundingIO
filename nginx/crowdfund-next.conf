# nginx config for the Next.js crowdfund-mn app.
# Copy to: /etc/nginx/sites-available/crowdfund-next
# Enable:  ln -sf /etc/nginx/sites-available/crowdfund-next /etc/nginx/sites-enabled/crowdfund-next
# Test:    nginx -t && systemctl reload nginx
#
# Important: do not proxy /api/* to the old Express API for this app.
# The Next app owns /api/* and /admin-api/* route handlers.

server {
    listen 80;
    server_name crowdfunding.bowsys.mn;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name crowdfunding.bowsys.mn;

    ssl_certificate     /etc/letsencrypt/live/crowdfunding.bowsys.mn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crowdfunding.bowsys.mn/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Allow 20 MB image files plus multipart overhead.
    client_max_body_size 25M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
