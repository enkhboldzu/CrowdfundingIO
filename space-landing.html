<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venture Past Our Sky</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          borderRadius: { DEFAULT: '9999px' },
          fontFamily: {
            heading: ['Instrument Serif', 'serif'],
            body:    ['Barlow', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { background: #000; overflow-x: hidden; margin: 0; }

    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0)    40%,
        rgba(255,255,255,0)    60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .liquid-glass-strong {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        rgba(255,255,255,0)   40%,
        rgba(255,255,255,0)   60%,
        rgba(255,255,255,0.2) 80%,
        rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
  <script>window.Motion = window.FramerMotion;</script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion } = window.Motion;

    /* suppress benign list-key dev warnings from Framer Motion */
    const _origErr = console.error;
    console.error = (...a) => {
      if (typeof a[0] === 'string' && a[0].includes('Each child in a list')) return;
      _origErr(...a);
    };

    /* ── Icons ──────────────────────────────────────────────────── */
    function IconArrowUpRight({ size = 20 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
          stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M7 17L17 7" />
          <path d="M7 7h10v10" />
        </svg>
      );
    }

    function IconPlay({ size = 16 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
          <polygon points="6 4 20 12 6 20 6 4" />
        </svg>
      );
    }

    /* ── FadingVideo ────────────────────────────────────────────── */
    function FadingVideo({ src, className, style }) {
      const videoRef    = useRef(null);
      const rafRef      = useRef(null);
      const fadingOutRef = useRef(false);
      const FADE_MS      = 500;
      const FADE_OUT_LEAD = 0.55;

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;

        function fadeTo(target) {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          const startOpacity = parseFloat(video.style.opacity) || 0;
          const startTime    = performance.now();
          function tick(now) {
            const t = Math.min((now - startTime) / FADE_MS, 1);
            video.style.opacity = String(startOpacity + (target - startOpacity) * t);
            if (t < 1) {
              rafRef.current = requestAnimationFrame(tick);
            } else {
              rafRef.current = null;
            }
          }
          rafRef.current = requestAnimationFrame(tick);
        }

        function onLoadedData() {
          video.style.opacity = '0';
          video.play().catch(() => {});
          fadeTo(1);
        }

        function onTimeUpdate() {
          if (
            !fadingOutRef.current &&
            video.duration > 0 &&
            video.duration - video.currentTime <= FADE_OUT_LEAD &&
            video.duration - video.currentTime > 0
          ) {
            fadingOutRef.current = true;
            fadeTo(0);
          }
        }

        function onEnded() {
          video.style.opacity = '0';
          if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; }
          setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => {});
            fadingOutRef.current = false;
            fadeTo(1);
          }, 100);
        }

        video.addEventListener('loadeddata',  onLoadedData);
        video.addEventListener('timeupdate',  onTimeUpdate);
        video.addEventListener('ended',       onEnded);
        if (video.readyState >= 2) onLoadedData();

        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          video.removeEventListener('loadeddata',  onLoadedData);
          video.removeEventListener('timeupdate',  onTimeUpdate);
          video.removeEventListener('ended',       onEnded);
        };
      }, []);

      return (
        <video
          ref={videoRef}
          src={src}
          autoPlay
          muted
          playsInline
          preload="auto"
          className={className}
          style={{ ...style, opacity: 0 }}
        />
      );
    }

    /* ── BlurText ───────────────────────────────────────────────── */
    function BlurText({ text, className }) {
      const containerRef = useRef(null);
      const [started, setStarted] = useState(false);
      const words = text.split(' ');

      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const io = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { setStarted(true); io.disconnect(); } },
          { threshold: 0.1 }
        );
        io.observe(el);
        return () => io.disconnect();
      }, []);

      return (
        <p
          ref={containerRef}
          className={className}
          style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}
        >
          {words.map((word, i) => (
            <motion.span
              key={i}
              initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
              animate={started
                ? { filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'], opacity: [0, 0.5, 1], y: [50, -5, 0] }
                : { filter: 'blur(10px)', opacity: 0, y: 50 }}
              transition={{ duration: 0.7, times: [0, 0.5, 1], ease: 'easeOut', delay: (i * 100) / 1000 }}
              style={{ display: 'inline-block', marginRight: '0.28em' }}
            >
              {word}
            </motion.span>
          ))}
        </p>
      );
    }

    /* ── Navbar ─────────────────────────────────────────────────── */
    const NAV_LINKS = ['Home', 'Voyages', 'Worlds', 'Innovation', 'Plan Launch'];

    function Navbar() {
      return (
        <nav className="fixed top-4 left-0 right-0 z-50 flex items-center justify-between px-8 lg:px-16">
          {/* Logo */}
          <div className="liquid-glass w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0">
            <span className="font-heading italic text-white text-xl leading-none select-none">a</span>
          </div>

          {/* Centre nav — desktop only */}
          <div className="hidden md:flex items-center liquid-glass rounded-full px-1.5 py-1.5">
            {NAV_LINKS.map(link => (
              <a key={link} href="#"
                className="px-3 py-2 text-sm font-medium text-white/90 font-body hover:text-white transition-colors whitespace-nowrap">
                {link}
              </a>
            ))}
            <button className="bg-white text-black rounded-full px-4 py-2 text-sm font-medium font-body flex items-center gap-1.5 whitespace-nowrap ml-1">
              Claim a Spot
              <IconArrowUpRight size={14} />
            </button>
          </div>

          {/* Balancing spacer */}
          <div className="w-12 h-12 flex-shrink-0" />
        </nav>
      );
    }

    /* ── Hero stat icons ─────────────────────────────────────────── */
    function ClockIcon() {
      return (
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
          stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10" />
          <polyline points="12 6 12 12 16 14" />
        </svg>
      );
    }

    function GlobeIcon() {
      return (
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
          stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="2" y1="12" x2="22" y2="12" />
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
        </svg>
      );
    }

    /* ── HeroSection ────────────────────────────────────────────── */
    const HERO_VIDEO = 'https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_080021_d598092b-c4c2-4e53-8e46-94cf9064cd50.mp4';
    const PARTNERS   = ['Aeon', 'Vela', 'Apex', 'Orbit', 'Zeno'];

    function fe(delay = 0) {
      return {
        initial:    { filter: 'blur(10px)', opacity: 0, y: 20 },
        animate:    { filter: 'blur(0px)',  opacity: 1, y: 0  },
        transition: { duration: 0.8, ease: 'easeOut', delay },
      };
    }

    function HeroSection() {
      return (
        <section className="relative h-screen overflow-hidden bg-black">
          {/* Background video — 120 % to keep focal point at top */}
          <FadingVideo
            src={HERO_VIDEO}
            className="absolute left-1/2 top-0 -translate-x-1/2 object-cover object-top z-0"
            style={{ width: '120%', height: '120%' }}
          />

          {/* Overlay layer */}
          <div className="relative z-10 flex flex-col h-full">

            {/* ── Hero content (centred) ── */}
            <div className="flex-1 flex flex-col items-center justify-center pt-24 px-4 text-center">

              {/* Badge */}
              <motion.div {...fe(0.4)}
                className="inline-flex items-center gap-2 liquid-glass rounded-full px-3 py-1.5 mb-6">
                <span className="bg-white text-black rounded-full px-3 py-1 text-xs font-semibold font-body">New</span>
                <span className="text-sm text-white/90 font-body pr-3">Maiden Crewed Voyage to Mars Arrives 2026</span>
              </motion.div>

              {/* Headline — word-by-word blur */}
              <BlurText
                text="Venture Past Our Sky Across the Universe"
                className="text-6xl md:text-7xl lg:text-[5.5rem] font-heading italic text-white leading-[0.8] max-w-2xl justify-center tracking-[-4px]"
              />

              {/* Sub-headline */}
              <motion.p {...fe(0.8)}
                className="mt-4 text-sm md:text-base text-white max-w-2xl font-body font-light leading-tight">
                Discover the universe in ways once unimaginable. Our pioneering vessels and
                breakthrough engineering bring deep-space exploration within reach—secure and extraordinary.
              </motion.p>

              {/* CTAs */}
              <motion.div {...fe(1.1)} className="flex items-center gap-6 mt-6">
                <button className="liquid-glass-strong rounded-full px-5 py-2.5 text-sm font-medium text-white font-body flex items-center gap-2 cursor-pointer">
                  Start Your Voyage
                  <IconArrowUpRight size={20} />
                </button>
                <button className="text-sm text-white font-body font-medium flex items-center gap-2 cursor-pointer opacity-80 hover:opacity-100 transition-opacity">
                  View Liftoff
                  <IconPlay size={16} />
                </button>
              </motion.div>

              {/* Stats row */}
              <motion.div {...fe(1.3)} className="flex items-stretch gap-4 mt-8">
                <div className="liquid-glass rounded-[1.25rem] p-5 w-[220px] flex flex-col gap-3">
                  <ClockIcon />
                  <div>
                    <div className="font-heading italic text-white text-4xl tracking-[-1px] leading-none">34.5 Min</div>
                    <div className="text-xs text-white font-body font-light mt-2">Average Videos Watch Time</div>
                  </div>
                </div>
                <div className="liquid-glass rounded-[1.25rem] p-5 w-[220px] flex flex-col gap-3">
                  <GlobeIcon />
                  <div>
                    <div className="font-heading italic text-white text-4xl tracking-[-1px] leading-none">2.8B+</div>
                    <div className="text-xs text-white font-body font-light mt-2">Users Across the Globe</div>
                  </div>
                </div>
              </motion.div>

            </div>

            {/* ── Partners ── */}
            <motion.div {...fe(1.4)} className="flex flex-col items-center gap-4 pb-8">
              <div className="liquid-glass rounded-full px-3.5 py-1 text-xs font-medium text-white font-body">
                Collaborating with top aerospace pioneers globally
              </div>
              <div className="flex items-center gap-12 md:gap-16">
                {PARTNERS.map(name => (
                  <span key={name} className="font-heading italic text-white text-2xl md:text-3xl tracking-tight">
                    {name}
                  </span>
                ))}
              </div>
            </motion.div>

          </div>
        </section>
      );
    }

    /* ── Capabilities section ────────────────────────────────────── */
    const CAPS_VIDEO = 'https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_094631_d30ab262-45ee-4b7d-99f3-5d5848c8ef13.mp4';

    function MatIconImage() {
      return (
        <svg viewBox="0 0 24 24" className="h-6 w-6 text-white" fill="currentColor">
          <path d="M5 21q-.825 0-1.412-.587T3 19V5q0-.825.588-1.412T5 3h14q.825 0 1.413.588T21 5v14q0 .825-.587 1.413T19 21H5Zm1-4h12l-3.75-5-3 4L9 13l-3 4Z" />
        </svg>
      );
    }

    function MatIconMovie() {
      return (
        <svg viewBox="0 0 24 24" className="h-6 w-6 text-white" fill="currentColor">
          <path d="M4 6.47 5.76 10H20v8H4V6.47M22 4h-4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.89-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4Z" />
        </svg>
      );
    }

    function MatIconBulb() {
      return (
        <svg viewBox="0 0 24 24" className="h-6 w-6 text-white" fill="currentColor">
          <path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1Zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7Z" />
        </svg>
      );
    }

    function Tag({ children }) {
      return (
        <span className="liquid-glass rounded-full px-3 py-1 text-[11px] text-white/90 font-body whitespace-nowrap">
          {children}
        </span>
      );
    }

    const CARDS = [
      {
        Icon: MatIconImage,
        tags:  ['Natural Context', 'Photo Realism', 'Infinite Settings', 'Eco-Vibe'],
        title: 'AI Scenery',
        body:  'AI analyzes your product to create indistinguishable natural environments — from Icelandic cliffs to misty forests.',
      },
      {
        Icon: MatIconMovie,
        tags:  ['Scale Fast', 'Visual Consistency', 'Time Saver', 'Ready to Post'],
        title: 'Batch Production',
        body:  'Style your entire product line in minutes. Create a unified visual identity for catalogues and social media without weeks of retouching.',
      },
      {
        Icon: MatIconBulb,
        tags:  ['Ray Tracing', 'Physical Shadows', 'Studio Quality', 'Sunlight Sync'],
        title: 'Smart Lighting',
        body:  'Automatic lighting and material adjustment. Achieve flawless integration with realistic shadows and sunlight.',
      },
    ];

    function CapabilitiesSection() {
      return (
        <section className="relative min-h-screen bg-black overflow-hidden">
          {/* Full-bleed background video */}
          <FadingVideo
            src={CAPS_VIDEO}
            className="absolute inset-0 w-full h-full object-cover z-0"
          />

          {/* Content */}
          <div className="relative z-10 px-8 md:px-16 lg:px-20 pt-24 pb-10 flex flex-col min-h-screen">

            {/* Header — mb-auto pushes cards to the bottom */}
            <div className="mb-auto">
              <p className="text-sm font-body text-white/80 mb-6">// Capabilities</p>
              <h2 className="font-heading italic text-white text-6xl md:text-7xl lg:text-[6rem] leading-[0.9] tracking-[-3px]">
                Production<br />evolved
              </h2>
            </div>

            {/* Cards grid */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-16">
              {CARDS.map(({ Icon, tags, title, body }, idx) => (
                <div key={idx} className="liquid-glass rounded-[1.25rem] p-6 min-h-[360px] flex flex-col">

                  {/* Top row: icon + tags */}
                  <div className="flex items-start justify-between gap-4">
                    <div className="liquid-glass w-11 h-11 rounded-[0.75rem] flex items-center justify-center flex-shrink-0">
                      <Icon />
                    </div>
                    <div className="flex flex-wrap justify-end gap-1.5 max-w-[70%]">
                      {tags.map(tag => <Tag key={tag}>{tag}</Tag>)}
                    </div>
                  </div>

                  {/* Spacer */}
                  <div className="flex-1" />

                  {/* Bottom: title + body */}
                  <div className="mt-6">
                    <h3 className="font-heading italic text-white text-3xl md:text-4xl tracking-[-1px] leading-none">
                      {title}
                    </h3>
                    <p className="mt-3 text-sm text-white/90 font-body font-light leading-snug max-w-[32ch]">
                      {body}
                    </p>
                  </div>

                </div>
              ))}
            </div>

          </div>
        </section>
      );
    }

    /* ── App ─────────────────────────────────────────────────────── */
    function App() {
      return (
        <>
          <Navbar />
          <HeroSection />
          <CapabilitiesSection />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
